<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="slateGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Large orbital paths (Anthropic-inspired) -->
  <path d="M100 85.6c-8.5 8.5-20.2 13.8-33.2 13.8-25.9 0-47-21-47-47s21-47 47-47c13 0 24.7 5.3 33.2 13.8"
        fill="none" stroke="url(#violetGrad)" stroke-width="12"/>
  
  <path d="M28 42.4c8.5-8.5 20.2-13.8 33.2-13.8 25.9 0 47 21 47 47s-21 47-47 47c-13 0-24.7-5.3-33.2-13.8"
        fill="none" stroke="url(#slateGrad)" stroke-width="12"/>

  <!-- Tauri-inspired dynamic paths -->
  <path d="M74.1 46.5c6.7 0 12.2-5.5 12.2-12.2 0-6.7-5.5-12.2-12.2-12.2-6.7 0-12.2 5.5-12.2 12.2 0 6.7 5.5 12.2 12.2 12.2z"
        fill="#8b5cf6" opacity="0.8"/>
  
  <path d="M53.6 81.5c6.7 0 12.2-5.5 12.2-12.2 0-6.7-5.5-12.2-12.2-12.2-6.7 0-12.2 5.5-12.2 12.2 0 6.7 5.5 12.2 12.2 12.2z"
        fill="#64748b" opacity="0.8"/>

  <!-- Central structure (Anthropic-inspired) -->
  <circle cx="64" cy="64" r="28" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.9"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="#64748b" stroke-width="1" opacity="0.85"/>
  
  <!-- Connection network -->
  <g id="connections" opacity="0.4">
    <path d="M74 46.5 L64 64 L53.6 81.5" fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
    <path d="M74 46.5 Q84 56.5 89 69" fill="none" stroke="#64748b" stroke-width="1.2"/>
    <path d="M53.6 81.5 Q44 71.5 39 59" fill="none" stroke="#64748b" stroke-width="1.2"/>
  </g>

  <!-- Node system -->
  <g id="nodes">
    <!-- Primary nodes -->
    <circle cx="74" cy="46.5" r="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="74" cy="46.5" r="3" fill="#8b5cf6" opacity="0.8"/>
    
    <circle cx="53.6" cy="81.5" r="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="53.6" cy="81.5" r="3" fill="#64748b" opacity="0.8"/>

    <!-- Central processing node -->
    <circle cx="64" cy="64" r="10" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="64" cy="64" r="4" fill="#64748b" opacity="0.8"/>
  </g>

  <!-- Additional connection points -->
  <g id="connection-points" opacity="0.9">
    <circle cx="89" cy="69" r="4" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
    <circle cx="39" cy="59" r="4" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  </g>
</svg>